name: CMake

on: [push, pull_request, workflow_dispatch]

env:
  BUILD_TYPE: Release

jobs:
  linux-build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        config:
            # GCC + libstdc++
          - cc: gcc-13
            cxx: g++-13
          - cc: gcc-14
            cxx: g++-14
            # clang + libcxx
          - cc: clang-17
            cxx: clang++-17
            runtime: libc++
            linker: LLD
          - cc: clang-18
            cxx: clang++-18
            runtime: libc++
            linker: LLD
          - cc: clang-19
            cxx: clang++-19
            runtime: libc++
            linker: LLD
            # clang + libstdc++ (compatibility)
          - cc: clang-17
            cxx: clang++-17
            runtime: libstdc++

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - run: |
        sudo apt-get update
        sudo apt-get install -y xorg-dev ${{matrix.config.cc}} libc++1 libc++-dev libc++abi1 lld

    - name: Setup Vulkan SDK
      uses: kociap/setup-vulkan-sdk@v1.0
      with:
           vulkan-query-version: 1.3.296.0
           vulkan-components: Vulkan-Headers, Vulkan-Loader, shaderc
           vulkan-use-cache: true

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_CXX_COMPILER=${{matrix.config.cxx}} \
          -DCMAKE_C_COMPILER=${{matrix.config.cc}} \
          ${{matrix.config.runtime && format('-DCMAKE_CXX_FLAGS=-stdlib={0}', matrix.config.runtime) || ''}} \
          ${{matrix.config.linker && format('-DCMAKE_LINKER_TYPE={0}', matrix.config.linker) || ''}} \
          -DVUK_BUILD_EXAMPLES=ON \
          -DVUK_USE_DXC=OFF

    - name: Build
      run: cmake --build ${{github.workspace}}/build

  windows-build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      uses: kociap/setup-vulkan-sdk@v1.0
      with:
           vulkan-query-version: 1.3.296.0
           vulkan-components: Vulkan-Headers, Vulkan-Loader, shaderc
           vulkan-use-cache: true

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build `
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
          -DVUK_BUILD_EXAMPLES=ON `
          -DVUK_USE_DXC=OFF

    - name: Build
      run: cmake --build ${{github.workspace}}/build

  macos-build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      uses: kociap/setup-vulkan-sdk@v1.0
      with:
           vulkan-query-version: 1.3.296.0
           vulkan-components: Vulkan-Headers, Vulkan-Loader, shaderc
           vulkan-use-cache: true

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DVUK_BUILD_EXAMPLES=ON \
          -DVUK_USE_DXC=OFF

    - name: Build
      run: cmake --build ${{github.workspace}}/build
